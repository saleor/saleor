name: Test Semgrep Rules
on:
  push:
    paths:
      - .semgrep/**
      - .github/workflows/test-semgrep-rules.yml
      - .pre-commit-config.yaml
  pull_request:
    paths:
      - .semgrep/**
      - .github/workflows/test-semgrep-rules.yml
      - .pre-commit-config.yaml

permissions: {}

jobs:
  main:
    runs-on: ubuntu-22.04
    container: python:3.12-slim

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .semgrep
            .pre-commit-config.yaml

      - name: Install Runtime Dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends yq make

      - name: Install Dependencies
        run: |
          # Greps the semgrep version from the pre-commit configuration
          # (ensures a single source of truth and a single source to update)
          semgrep_version=$(
            `# Grep + tail are grabbing the 'rev' field` \
            grep -m1 -A 1 \
              -F 'repo: https://github.com/returntocorp/semgrep' .pre-commit-config.yaml \
            | tail -n1 \
            `# Extracts the version number from the YAML comment` \
            | sed -nE 's/.*# frozen: v(.*)/\1/p')
          pip install semgrep=="$semgrep_version"

      - name: Run Tests
        working-directory: .semgrep
        run: make test
