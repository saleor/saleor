name: Tests & Linters

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - Dockerfile
      - "saleor/**"
      - .github/workflows/tests-and-linters.yml
      - pyproject.toml
      - uv.lock
  push:
    branches:
      - main
    paths:
      - "**.py"
      - Dockerfile
      - "saleor/**"
      - .github/workflows/tests-and-linters.yml
      - pyproject.toml
      - uv.lock

env:
  CACHE_URL: "redis://cache:6379/0"
  DATABASE_URL: "postgres://saleor:saleor@postgres:5432/saleor"
  SECRET_KEY: ci-test

# Will group same workflow in the PR. Once new commit is pushed, old workflow will be cancelled
# This is saving resources and prevents unnecessary queues when fresh jobs wait for stale ones
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    container: python:3.12
    name: Run unit tests

    permissions:
      contents: read

    services:
      postgres:
        image: library/postgres:15-alpine
        env:
          POSTGRES_PASSWORD: saleor
          POSTGRES_USER: saleor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      cache:
        image: valkey/valkey:8.1-alpine
        options: >-
          --health-cmd "valkey-cli ping | grep PONG"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          apt-get install -y libpq-dev

      - uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4 # v6.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Run unit tests
        run: |
          uv run pytest \
            -m "not e2e" \
            -n logical

  linters:
    runs-on: ubuntu-latest
    container: python:3.12
    name: Run linters

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          apt-get install -y libpq-dev

      - uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4 # v6.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      # Run linters and Django related checks
      # `git config` command is a workaround for https://github.com/actions/runner-images/issues/6775
      - name: Run Linters and Checks
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          uv run pre-commit run --all --show-diff-on-failure
        if: ${{ always() }}
