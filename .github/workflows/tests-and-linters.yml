name: Tests & Linters

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - Dockerfile
      - "saleor/**"
      - .github/workflows/tests-and-linters.yml
      - pyproject.toml
      - uv.lock
  push:
    branches:
      - main
    paths:
      - "**.py"
      - Dockerfile
      - "saleor/**"
      - .github/workflows/tests-and-linters.yml
      - pyproject.toml
      - uv.lock

env:
  BENCH_PATH: ./queries-results.json
  CACHE_URL: "redis://cache:6379/0"
  DATABASE_URL: "postgres://saleor:saleor@postgres:5432/saleor"
  SECRET_KEY: ci-test

# Will group same workflow in the PR. Once new commit is pushed, old workflow will be cancelled
# This is saving resources and prevents unnecessary queues when fresh jobs wait for stale ones
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    container: python:3.12
    name: Run unit tests

    permissions:
      contents: read

    services:
      postgres:
        image: library/postgres:15-alpine
        env:
          POSTGRES_PASSWORD: saleor
          POSTGRES_USER: saleor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      cache:
        image: valkey/valkey:8.1-alpine
        options: >-
          --health-cmd "valkey-cli ping | grep PONG"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          apt-get install -y libpq-dev

      - uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v6.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Run unit tests
        run: |
          uv run pytest \
            -m "not e2e" \
            --junitxml=junit/test-results.xml \
            -o junit_family=legacy \
            --django-db-bench="$BENCH_PATH" \
            -n logical

      - name: Upload Test Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pytest-results
          path: junit/test-results.xml
          # Throw an error if test results aren't reported. This could happen
          # when bumping dependencies for example.
          if-no-files-found: error
        if: ${{ always() }}

      # Publish detected differences as comment
      - name: Compare DB Queries Results (PR)
        uses: NyanKiyoshi/pytest-django-queries-ci-tools@45b5ac36ff19669a88fe56429b662b0661d8f46b # v1.1.1
        with:
          query_raw_dump_path: ${{ env.BENCH_PATH }}
          diff_endpoint: "https://dtab784j47g1o.cloudfront.net/default/saleor-db-queries-bot-diff"
          diff_results_base_url: "https://dtab784j47g1o.cloudfront.net"
        if: github.event_name == 'pull_request' && github.repository == 'saleor/saleor'

      - name: Upload DB Queries Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pytest-django-db-queries-results
          path: ${{ env.BENCH_PATH }}
          if-no-files-found: error

  # Uploads the SQL count report for base branches
  upload-query-count-base-branch:
    if: github.event_name == 'push' && github.repository == 'saleor/saleor'

    needs: [unit_tests]
    runs-on: ubuntu-latest
    environment: pytest-upload-django-db-queries

    permissions: {}

    steps:
      - name: Download Reports
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: pytest-django-db-queries-results
          path: results/

      - name: Upload Results
        uses: NyanKiyoshi/pytest-django-queries-ci-tools@45b5ac36ff19669a88fe56429b662b0661d8f46b # v1.1.1
        with:
          query_raw_dump_path: results/queries-results.json
          upload_endpoint: ${{ secrets.QUERIES_UPLOAD_ENDPOINT_URL }}
          upload_secret_key: ${{ secrets.QUERIES_UPLOAD_SECRET }}

  linters:
    runs-on: ubuntu-latest
    container: python:3.12
    name: Run linters

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          apt-get install -y libpq-dev

      - uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v6.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      # Run linters and Django related checks
      # `git config` command is a workaround for https://github.com/actions/runner-images/issues/6775
      - name: Run Linters and Checks
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          uv run pre-commit run --all --show-diff-on-failure
        if: ${{ always() }}
