name: Test migrations compatibility

on:
  pull_request:
    branches:
      - "3.*"
      - "main"
    paths:
      - "**/migrations/**"
      - .github/workflows/test-migrations-compatibility.yml

env:
  DATABASE_URL: "postgres://saleor:saleor@postgres:5432/saleor"
  SECRET_KEY: ci-test

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.12

    permissions:
      contents: read

    services:
      postgres:
        image: library/postgres:15-alpine
        env:
          POSTGRES_PASSWORD: saleor
          POSTGRES_USER: saleor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          apt-get install -y libpq-dev

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      # Sync dependencies if cache is not hit or there is a partial key match
      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Migrate
        run: |
          export DJANGO_SETTINGS_MODULE=saleor.tests.settings
          uv run python manage.py migrate

      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      # Sync dependencies to ensure consistency with base branch
      - name: Synchronize dependencies
        run: |
          uv sync --locked

      - name: Run tests
        run: |
          export PYTEST_DB_URL="$DATABASE_URL"
          uv run pytest -n 0 --reuse-db
