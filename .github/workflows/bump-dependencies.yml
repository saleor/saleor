name: Bump dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 1 * *" # At 08:00 on day-of-month 1

permissions: {}

jobs:
  bump-dependencies:
    if: ${{ github.event_name != 'schedule' || github.repository == 'saleor/saleor' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Do not allow cache as other actions could write to that cache
          # for lateral movement, and the workflow runs too infrequently
          # thus there isn't any benefit.
          enable-cache: false

      - run: python -m pip install pre-commit
      - run: uv lock --upgrade
      - run: pre-commit autoupdate
      - run: git status

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bump-dependencies
          delete-branch: true
          commit-message: Bump dependencies
          title: "Bump dependencies"
          body: |
            Monthly update of backend dependencies.
          labels: |
            :robot: bot
            test deployment
