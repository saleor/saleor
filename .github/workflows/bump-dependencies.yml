name: Bump dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 1 * *" # At 08:00 on day-of-month 1

permissions: {}

jobs:
  bump-dependencies:
    if: ${{ github.event_name != 'schedule' || github.repository == 'saleor/saleor' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Do not allow cache as other actions could write to that cache
          # for lateral movement, and the workflow runs too infrequently
          # thus there isn't any benefit.
          enable-cache: false

      - run: python -m pip install pre-commit
      - run: uv lock --upgrade
      - run: pre-commit autoupdate
      - run: git status

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bump-dependencies
          delete-branch: true
          commit-message: Bump dependencies
          title: "Bump dependencies"
          body: |
            Monthly update of backend dependencies.
          labels: |
            :robot: bot
            test deployment
