name: e2e suite

on:
  workflow_dispatch:
  schedule:
    # At 2:00 AM UTC on Monday, Wednesday, and Friday
    - cron: "00 2 * * 1,3,5"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - Dockerfile
      - "saleor/**"
      - ".github/workflows/e2e.yml"
      - pyproject.toml
      - uv.lock

permissions: {}
env:
  DATABASE_URL: "postgres://saleor:saleor@postgres:5432/saleor"
  SECRET_KEY: ci-test

jobs:
  e2e-tests:
    if: ${{ github.event_name != 'schedule' || github.repository == 'saleor/saleor' }}
    runs-on: ubuntu-22.04
    container: python:3.12
    name: Run E2E tests

    permissions:
      contents: read

    services:
      postgres:
        image: library/postgres:15-alpine
        env:
          POSTGRES_PASSWORD: saleor
          POSTGRES_USER: saleor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          apt-get install -y libpq-dev

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Run E2E tests
        run: |
          uv run pytest -m "e2e" --junit-xml=e2e-test-results.xml

      - name: Surface failing tests
        if: always()
        uses: pmeier/pytest-results-action@fdc7f18d9934e38aca411ca9557e6577bd25ca9c # v0.9.0
        with:
          path: e2e-test-results.xml
          summary: true
          display-options: fEX
          fail-on-empty: true
          title: E2E core test results
