name: Create release tag on release PR merge
on:
  pull_request:
    types:
      - closed

permissions: {}

jobs:
  create-release-tag:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')

    permissions:
      # Needed to write tags & releases
      # Docs: https://docs.github.com/en/rest/authentication/permissions-required-for-github-apps?apiVersion=2022-11-28#repository-permissions-for-contents
      contents: write

    env:
      GH_REF: ${{ github.event.pull_request.head.ref }}
      GH_TOKEN: ${{ github.token }}

    outputs:
      version: ${{ steps.set-version.outputs.VERSION }}

    steps:
      - name: Set version
        id: set-version
        run: echo "VERSION=$GH_REF" | sed "s/release-//" >> $GITHUB_OUTPUT
      - name: Check latest version
        id: check-latest
        env:
          VERSION: ${{ steps.set-version.outputs.VERSION }}
        run: |
          set -ux

          # Only stable semver releases (e.g. 3.22.0) can be tagged as latest.
          # Non-semver refs (branch names, PR refs) are not valid candidates to become latest.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag inferred from this run ('$VERSION') is not a semver release - can't be tagged as latest."
            echo "IS_LATEST=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT_LATEST=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)
          HIGHEST=$( (echo "$CURRENT_LATEST"; echo "$VERSION") | sort -V | tail -1)

          echo "Selected: $VERSION, Latest: $CURRENT_LATEST"

          if [ "$VERSION" = "$HIGHEST" ]; then
            echo "IS_LATEST=true" >> $GITHUB_OUTPUT
          else
            echo "IS_LATEST=false" >> $GITHUB_OUTPUT
          fi
      - name: Create tag
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.set-version.outputs.VERSION }}
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${process.env.VERSION}`,
              sha: context.sha
            })
      - name: Create github release
        env:
          VERSION: ${{ steps.set-version.outputs.VERSION }}
          IS_LATEST: ${{ steps.check-latest.outputs.IS_LATEST }}
        run: |
          gh release create -d "$VERSION" --repo="$GITHUB_REPOSITORY" --latest="$IS_LATEST" --generate-notes --verify-tag

  publish:
    needs: [create-release-tag]
    uses: ./.github/workflows/publish-containers.yml

    permissions:
      contents: read
      id-token: write # needed for AWS/ECR login (not used, but required permission)
      packages: write # needed for GHCR

    with:
      version: ${{ needs.create-release-tag.outputs.version }}
      ref: ${{ needs.create-release-tag.outputs.version }}
      notification-environment: notify-slack-releasing
      publish-environment: publish-tag
    secrets: inherit

  deploy:
    runs-on: ubuntu-24.04
    environment: release-deploy
    needs: [publish]
    permissions: {}

    steps:
      - name: Get Token
        id: get-token
        uses: saleor/saleor-internal-actions/request-vault-token@49a069ae9731cfccf3a1033fe1da4e3da84f4f2a # v1.11.0
        with:
          vault-url: ${{ secrets.VAULT_URL }}
          vault-jwt: ${{ secrets.VAULT_JWT }}

      - name: Trigger staging deployment for tagged release
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          payload=$(
              jq --arg version "$VERSION" --null-input '
                {
                  "event_type": "deploy-staging",
                  "client_payload": {"version": $version}
                }
              '
          )

          gh api /repos/saleor/saleor-multitenant/dispatches --input - <<< "$payload"
