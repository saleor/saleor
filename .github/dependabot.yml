version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 21 # 3 weeks
- package-ecosystem: "uv"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 10
  cooldown:
    default-days: 21 # 3 weeks
